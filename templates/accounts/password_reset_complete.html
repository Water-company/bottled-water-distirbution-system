{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card p-5 text-center">
            <h1 class="h3 mb-3">Password reset complete</h1>
            <p class="text-secondary">You can now log in using your new password.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary">Go to login</a>
        </div>
    </div>
</div>
{% endblock %}
